name: Release Beta DMG

on:
  workflow_dispatch:
    inputs:
      macos_runner:
        description: "macOS runner label for the build job."
        required: false
        default: macos-26
        type: string
      xcode_version:
        description: "Xcode version selected by setup-xcode."
        required: false
        default: "26.4.1"
        type: string

jobs:
  release-beta:
    uses: QuentinHsu/workflow/.github/workflows/macos-swiftpm-sparkle-dmg-beta-release.yml@main
    permissions:
      contents: write
    with:
      beta_branch: beta
      beta_tag: pre-release
      app_target_name: SkillsHub
      app_display_name: Skills Hub
      app_bundle_id: com.skillshub.app
      app_min_macos: "15.0"
      app_icon_path: Assets/AppIcon.icns
      macos_runner: ${{ inputs.macos_runner || vars.MACOS_RUNNER || 'macos-26' }}
      xcode_version: ${{ inputs.xcode_version || vars.XCODE_VERSION || '26.4.1' }}
      release_kit_repository: QuentinHsu/workflow
      release_kit_ref: main
      release_kit_path: release-kits/macos/swiftpm-sparkle
      sparkle_public_ed_key: ${{ vars.SPARKLE_PUBLIC_ED_KEY }}
      architectures: '["arm64","x86_64"]'
    secrets:
      sparkle_private_ed_key: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
